services:
  db:
    image: postgres:16-alpine
    container_name: todo-db
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "${DB_HOST_PORT:-55432}:5432"
    volumes:
      - todo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: todo-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://todo:todo@db:5432/todo?schema=public
      CORS_ORIGIN: http://localhost:5173
      PORT: 3000
      API_KEY: local-dev-key
    ports:
      - "${API_HOST_PORT:-3001}:3000"
    volumes:
      - ./api:/app
      - /app/node_modules

volumes:
  todo_postgres_data:
